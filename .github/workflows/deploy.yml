name: Deploy to GitHub Pages

on:
  push:
    branches: 'main'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: # 👈 إضافة هذه السطور تضمن عدم حدوث Error 403 مستقبلاً
      contents: write
    steps:
      - name: Checkout

        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # المجلد الناتج عن البناء
          branch: gh-pages # الفرع الذي سيتم رفع الموقع عليه